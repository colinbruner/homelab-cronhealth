apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cronhealth-secrets
  namespace: cronhealth
spec:
  # The item's field labels must match the expected env var keys:
  #   DATABASE_URL, OIDC_ISSUER, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET,
  #   OIDC_REDIRECT_URL, SESSION_SECRET,
  #   AWS_SES_FROM, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  itemPath: "vaults/lab/items/cronhealth"
