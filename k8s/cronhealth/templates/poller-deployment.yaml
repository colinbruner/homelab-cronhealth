apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-poller
  labels:
    {{- include "cronhealth.labels" . | nindent 4 }}
    app.kubernetes.io/component: poller
spec:
  replicas: {{ .Values.poller.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: poller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: poller
    spec:
      containers:
        - name: poller
          image: "{{ .Values.poller.image.repository }}:{{ .Values.poller.image.tag }}"
          imagePullPolicy: {{ .Values.poller.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ include "cronhealth.secretName" . }}
          resources:
            {{- toYaml .Values.poller.resources | nindent 12 }}
