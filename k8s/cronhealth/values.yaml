# -- Global settings
namespace: cronhealth

# -- Container images
api:
  image:
    repository: ghcr.io/colinbruner/cronhealth-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

poller:
  image:
    repository: ghcr.io/colinbruner/cronhealth-poller
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

ui:
  image:
    repository: ghcr.io/colinbruner/cronhealth-ui
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -- Ingress
ingress:
  enabled: true
  className: traefik
  host: cronhealth.internal
  tls: []
  annotations: {}

# -- Environment configuration (non-secret)
config:
  port: "8080"
  pollIntervalSeconds: "30"
  alertCooldownMinutes: "60"
  awsRegion: "us-east-1"
  awsSnsSmsEnabled: "false"

# -- Name of the existing Secret to use for all sensitive env vars.
# Created by the 1Password operator from k8s/secrets.yaml (OnePasswordItem).
existingSecret: "cronhealth-secrets"
