{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "cronhealth.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  OIDC_ISSUER: {{ .Values.secrets.oidcIssuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientId | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  OIDC_REDIRECT_URL: {{ .Values.secrets.oidcRedirectUrl | quote }}
  SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  ALLOWED_OIDC_EMAILS: {{ .Values.secrets.allowedOidcEmails | quote }}
  AWS_SES_FROM: {{ .Values.secrets.awsSesFrom | quote }}
  AWS_SNS_SMS_ENABLED: {{ .Values.secrets.awsSnsSmsEnabled | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
{{- end }}
