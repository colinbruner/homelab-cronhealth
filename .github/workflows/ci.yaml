name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build API
        run: go build -o /dev/null ./cmd/api

      - name: Build Poller
        run: go build -o /dev/null ./cmd/poller

      - name: Test
        run: go test ./...

  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [go, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t cronhealth-api:ci .

      - name: Build Poller image
        run: docker build --target poller -t cronhealth-poller:ci .

      - name: Build UI image
        run: docker build -t cronhealth-ui:ci ./ui

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint charts/cronhealth
